# Example: $XDG_CONFIG_HOME/cc-statusbar/config.toml
# Every field is optional; defaults match the bash original.
# Env vars (LINEAR_WORKSPACE, CC_STATUSLINE_*) take precedence over file values.

# Linear workspace prefix used in [TICKET] hyperlinks.
linear_workspace = "teamclara"

# Cells subtracted from terminal width to absorb Nerd Font glyph variance.
safety_margin = 6

# Cell width for Nerd Font PUA glyphs (1 = single, 2 = double).
nerd_font_width = 1

# Seconds. How long the current-branch PR cache is fresh.
pr_cache_ttl = 10

# Seconds. How long the "other PRs" cache + their states are fresh.
other_cache_ttl = 120

# Append focus diagnostics to /tmp/cc-focus-<session_id>.log every render.
debug_focus_log = true

# Trailing spinner style.
#   "compact"  – single braille frame, advanced one frame per render
#   "epoch-N"  – last N digits of the wall-clock epoch (e.g. "epoch-3" → "535")
spinner = "compact"

# ─── Layout ────────────────────────────────────────────────────────────────
#
# The layout engine renders every component at its default size and shrinks
# lowest-priority components first when the line is too wide. Hysteresis
# (`hysteresis_band`) keeps decisions sticky across small terminal nudges.

[layout]
left = [
  "repo",
  "pr_icon",
  "branch",
  "pr_num",
  "ci",
  "review",
  "comments",
  "dirty",
  "ahead",
  "behind",
  "ticket",
  "chips",
]
right = [
  "burn",
  "agents",
  "quotas",
  "ctx_bar",
  "loc",
  "model",
  "effort",
  "spinner",
]
gap = 2
autoresize = true
hysteresis_band = 2
# When chips collapses to its compact `×N` form, render the expanded
# `#a #b #c …` chain on a second row. Disable to keep the bar one line.
overflow_chips_to_second_row = true

# ─── Per-component config ──────────────────────────────────────────────────
#
# Common fields (every block accepts these):
#   sizes    = list of allowed size buckets, e.g. ["m", "l", "xl"]
#   min      = "m"        # don't shrink past this size
#   default  = "xl"       # initial size before autoresize
#   priority = 9          # higher = shrunk LAST
#   required = true       # never drop entirely
#
# Component-specific fields are documented per block below.

[ctx_bar]
priority = 90
default  = "m"
width    = 10
filled   = "▓"
empty    = "░"

[chips]
priority = 5
# Graphite stack rendering. When `gt log --json` succeeds in $CWD and at least
# two of the session's discovered PRs map to branches in the stack, chips are
# reordered trunk → leaf and joined with `stack_separator`, prefixed by
# `stack_glyph` rendered in dim cyan. PRs not reachable from trunk are
# appended after the stacked chain, sorted by ascending PR number.
#
# stack_glyph = ""        # disable the leading marker
# force_stack = true      # use stack layout even when `gt` is absent
stack_separator   = "─•─"
stack_glyph       = ""   # nf-oct-git_branch
force_stack       = false
stack_refresh_ttl = 60

[model]
priority = 80

[burn]
priority = 8

[spinner]
priority = 100
required = true
