#:schema https://raw.githubusercontent.com/NorthIsUp/cc-statusline/main/config.schema.json
# Example: $XDG_CONFIG_HOME/cc-statusbar/config.toml
# Every field is optional; defaults match the bash original.
# Env vars (LINEAR_WORKSPACE, CC_STATUSLINE_*) take precedence over file values.

# Linear workspace prefix used in [TICKET] hyperlinks.
linear_workspace = "teamclara"

# Cells subtracted from terminal width to absorb Nerd Font glyph variance.
safety_margin = 6

# Cell width for Nerd Font PUA glyphs (1 = single, 2 = double).
nerd_font_width = 1

# Seconds. How long the current-branch PR cache is fresh.
pr_cache_ttl = 10

# Seconds. How long the "other PRs" cache + their states are fresh.
other_cache_ttl = 120

# Append focus diagnostics to /tmp/cc-focus-<session_id>.log every render.
debug_focus_log = true

# Trailing spinner style.
#   "compact"  – single braille frame, advanced one frame per render
#   "epoch-N"  – last N digits of the wall-clock epoch (e.g. "epoch-3" → "535")
spinner = "compact"

# ─── Layout ────────────────────────────────────────────────────────────────
#
# The layout engine renders every component at its default size and shrinks
# lowest-priority components first when the line is too wide. Hysteresis
# (`hysteresis_band`) keeps decisions sticky across small terminal nudges.

[layout]
left = [
  "repo",
  "pr_icon",
  "branch",
  "pr_num",
  "ci",
  "review",
  "comments",
  "dirty",
  "ahead",
  "behind",
  "ticket",
  "chips",
]
right = [
  "burn",
  "agents",
  "quotas",
  "ctx_bar",
  "loc",
  "model",
  "effort",
  "spinner",
]
# Tip: address individual quota buckets at separate layout positions with
# the dotted form, e.g.
#   right = ["burn", "quotas.hourly", "ctx_bar", "quotas.weekly", "model"]
# Recognised dotted entries: quotas.hourly, quotas.weekly, quotas.design,
# quotas.sonnet. The bare `quotas` entry still renders every configured
# bucket joined with `·`.
gap = 2
autoresize = true
hysteresis_band = 2
# When chips collapses to its compact `×N` form, render the expanded
# `#a #b #c …` chain on a second row. Disable to keep the bar one line.
overflow_chips_to_second_row = true

# ─── Per-component config ──────────────────────────────────────────────────
#
# Common fields (every block accepts these):
#   sizes    = list of allowed size buckets, e.g. ["m", "l", "xl"]
#   min      = "m"        # don't shrink past this size
#   default  = "xl"       # initial size before autoresize
#   priority = 9          # higher = shrunk LAST
#   required = true       # never drop entirely
#
# Component-specific fields are documented per block below.

# ─── Shared percent-display modes ──────────────────────────────────────────
#
# Every percent-aware component (`ctx_bar`, `quotas`, `burn`) shares the same
# `mode` knob plus optional `width`/`filled`/`empty` overrides. Available
# modes:
#
#   "percent"  -> "47%"
#   "float"    -> "0.47"
#   "dots"     -> single cell, 9 levels:  ⠀⡀⡄⡆⡇⣇⣧⣷⣿
#   "shaded"   -> single cell, 5 levels:  ' ░▒▓█'
#   "hbar"     -> multi-cell horizontal bar with sub-cell precision via
#                 ▏▎▍▌▋▊▉█ (configurable via `width`/`filled`/`empty`)
#   "vbar"     -> single cell, 8 vertical levels: ▁▂▃▄▅▆▇█
#
# `width` only matters for `hbar`. `filled`/`empty` only matter for `hbar`
# (they're ignored in every other mode but still parse cleanly for back-compat
# with older configs).

[ctx_bar]
priority = 90
default  = "m"
# mode = "percent"   # default — just renders "47%"
# mode = "hbar"      # multi-cell bar, sub-cell precision
# mode = "dots"      # one-cell braille meter
# mode = "shaded"    # one-cell shade ramp
# mode = "vbar"      # one-cell vertical bar
# mode = "float"     # "0.47"
# width  = 10
# filled = "█"
# empty  = " "

[quotas]
# Same `mode` options as ctx_bar. Reset-time suffix (e.g. "(2h30m)") is
# appended regardless of mode, so switching to `dots`/`hbar` doesn't lose
# the reset clock.
#
# Top-level keys here act as defaults for every bucket. Per-bucket
# sub-sections override the parent defaults wholesale (the override sub-
# section's `mode`/`width`/`filled`/`empty` replace the parent's, they
# don't field-merge). Render order: hourly → weekly → design → sonnet;
# empty buckets are skipped silently.
# mode = "percent"

# [quotas.hourly]    # 5-hour bucket (rate_limits.five_hour)
# mode = "vbar"
# priority = 30      # elevate just this bucket when used as `quotas.hourly`

# [quotas.weekly]    # 7-day bucket (rate_limits.seven_day)
# mode = "hbar"
# width = 8

# [quotas.design]    # design-partner / opus-design quota
# mode = "dots"

# [quotas.sonnet]    # sonnet model quota
# mode = "shaded"

[burn]
priority = 8
# `burn` doesn't have a native percent — it's derived from
# `tokens_per_hour / max_tokens_per_hour`. The text modes (`percent`,
# `float`) keep the legacy `Σ 1.5M/hr` rendering. The visual modes
# (`dots`/`shaded`/`hbar`/`vbar`) replace the text with a colored meter.
# mode = "percent"
# max_tokens_per_hour = 5_000_000

[chips]
priority = 5
# Graphite stack rendering. When `gt log --json` succeeds in $CWD and at least
# two of the session's discovered PRs map to branches in the stack, chips are
# reordered trunk → leaf and joined with `stack_separator`, prefixed by
# `stack_glyph` rendered in dim cyan. PRs not reachable from trunk are
# appended after the stacked chain, sorted by ascending PR number.
#
# stack_glyph = ""        # disable the leading marker
# force_stack = true      # use stack layout even when `gt` is absent
stack_separator   = "─•─"
stack_glyph       = ""   # nf-oct-git_branch
force_stack       = false
stack_refresh_ttl = 60
# Drop merged PRs older than this many hours from the chips chain. The
# current branch's own PR is never filtered. Stack mode (gt) bypasses the
# filter entirely. Set to 0 to disable.
collapse_merged_after_hours = 36

[model]
priority = 80

[spinner]
priority = 100
required = true
