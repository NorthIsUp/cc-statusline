name: Tag on version bump

# Watches main for changes to Cargo.toml. When the `version = "X.Y.Z"` line
# changes (and a matching tag doesn't already exist), pushes a `vX.Y.Z` tag
# which fires the release workflow. Lets contributors trigger a release with
# a normal commit ("chore: prepare v0.2.0") instead of a manual `git tag`.

on:
  push:
    branches: [main]
    paths: [Cargo.toml]

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from Cargo.toml
        id: version
        run: |
          ver=$(grep -m1 -E '^version = ' Cargo.toml | cut -d'"' -f2)
          if [ -z "$ver" ]; then
            echo "Could not parse version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Check whether tag already exists
        id: check
        run: |
          if git rev-parse -q --verify "refs/tags/v${{ steps.version.outputs.version }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check.outputs.exists == 'false'
        env:
          TAG: v${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"
