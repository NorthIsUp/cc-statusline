name: Release

# Triggers on a Cargo.toml version bump landing on main. One workflow does
# everything: read version, skip if a matching tag already exists, build all
# targets, create the tag, publish the release.
#
# We avoid the two-workflow split (tag.yml -> release.yml on tag push) because
# tags pushed by the default GITHUB_TOKEN don't trigger downstream workflows.

on:
  push:
    branches: [main]
    paths: [Cargo.toml]
  # Allow re-running the release manually if needed.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      release: ${{ steps.read.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: read
        run: |
          ver=$(grep -m1 -E '^version = ' Cargo.toml | cut -d'"' -f2)
          if [ -z "$ver" ]; then
            echo "Could not parse version from Cargo.toml" >&2
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v$ver" >/dev/null; then
            echo "Tag v$ver already exists; skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version
    if: needs.version.outputs.release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cc-statusline-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cc-statusline-aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: cc-statusline-x86_64-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: cc-statusline-aarch64-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: cc-statusline-x86_64-windows.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/cc-statusline ${{ matrix.artifact }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/cc-statusline.exe ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: [version, build]
    if: needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create checksums
        run: |
          cd artifacts
          sha256sum cc-statusline-* > checksums-sha256.txt

      - name: Extract changelog section
        id: changelog
        run: |
          version="${{ needs.version.outputs.version }}"
          notes=$(awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md)
          if [ -z "$notes" ]; then
            echo "has_notes=false" >> $GITHUB_OUTPUT
          else
            {
              echo 'notes<<CHANGELOG_EOF'
              echo "$notes"
              echo 'CHANGELOG_EOF'
            } >> $GITHUB_OUTPUT
            echo "has_notes=true" >> $GITHUB_OUTPUT
          fi

      - name: Tag the release commit
        env:
          TAG: v${{ needs.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          body: ${{ steps.changelog.outputs.has_notes == 'true' && steps.changelog.outputs.notes || '' }}
          generate_release_notes: true
          files: |
            artifacts/cc-statusline-*
            artifacts/checksums-sha256.txt
